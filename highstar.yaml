name: prompt-drift-watch
one_liner: Detect risky prompt and coding-agent instruction drift.
target_user: AI agent developers and LLM product engineers
pain_point: Prompt and agent rule changes often remove hidden guardrails that reviewers miss in a normal diff.
demo_command: PYTHONPATH=src python3 -m prompt_drift_watch examples/baseline_agents.md examples/changed_agents.md --format github
tier: flagship
maturity_status: trend-aligned-2026-05-31
next_release: v0.2.1
polish_score: 94
topics:
  - ai-tools
  - prompt-engineering
  - agents
  - llmops
  - cli
  - developer-tools
release_channel:
  - github
  - ai-engineering-communities
  - developer-tooling-discussions
launch_copy:
  - I built prompt-drift-watch to catch risky prompt and coding-agent instruction drift before it ships.
  - It flags removed guardrails, vague additions, risk categories, and GitHub Actions annotations in one local CLI command.
  - Try it with PYTHONPATH=src python3 -m prompt_drift_watch examples/baseline_agents.md examples/changed_agents.md --format github
quality_gate:
  commands:
    - python3 -m unittest discover -s tests
metrics_goal:
  day_1_stars: 5
  day_3_stars: 15
  day_7_stars: 50
